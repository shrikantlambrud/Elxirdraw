<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Property | Rental System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background: linear-gradient(120deg,#0f2027,#2c5364);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Segoe UI',sans-serif;
}

.property-card{
width:450px;
background:white;
padding:35px;
border-radius:12px;
box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.title{
text-align:center;
font-weight:600;
margin-bottom:25px;
}

.form-control{
height:45px;
border-radius:8px;
}

.btn-pay{
width:100%;
height:45px;
border-radius:8px;
font-weight:600;
}

.note{
font-size:13px;
text-align:center;
margin-top:10px;
color:#666;
}

</style>

</head>

<body>

<div class="property-card">

<h3 class="title">Add Property</h3>

<form method="POST" enctype="multipart/form-data">

<input name="title" placeholder="Property Title" class="form-control mb-3" required>

<input name="price" placeholder="Monthly Rent ₹" class="form-control mb-3" required>

<input name="deposit" placeholder="Deposit Amount (Optional)" class="form-control mb-3">

<input name="city" placeholder="City" class="form-control mb-3" required>

<input name="area" placeholder="Area / Location" class="form-control mb-3" required>

<input 
name="contact_number"
placeholder="Owner Contact Number"
class="form-control mb-3"
pattern="[0-9]{10}"
maxlength="10"
required>

<label class="mb-1">Flat Image 1</label>
<input type="file" name="image1" class="form-control mb-3">

<label class="mb-1">Flat Image 2</label>
<input type="file" name="image2" class="form-control mb-3">

<input name="map_link" 
placeholder="Google Map Location Link" 
class="form-control mb-3">

<button class="btn btn-warning btn-pay">
Proceed to Pay ₹10
</button>

</form>

<div class="note">
₹10 listing fee required to publish property
</div>

</div>

</body>
</html>
