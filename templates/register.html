<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register | Rental System</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(120deg,#1d4350,#a43931);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
}

.register-card{
    width:400px;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 12px 35px rgba(0,0,0,0.25);
}

.register-title{
    text-align:center;
    font-weight:600;
    margin-bottom:25px;
}

.form-control{
    height:45px;
    border-radius:8px;
}

.btn-register{
    width:100%;
    height:45px;
    border-radius:8px;
    font-weight:500;
}

.login-link{
    text-align:center;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="register-card">

<h3 class="register-title">Create Account</h3>

<form method="POST">

<input name="name" placeholder="Full Name" class="form-control mb-3" required>

<input name="email" placeholder="Email Address" class="form-control mb-3" required>

<input name="password" type="password" placeholder="Password" class="form-control mb-3" required>

<select name="role" class="form-control mb-3">
<option value="owner">Owner</option>
<option value="renter">Renter</option>
</select>

<button class="btn btn-primary btn-register">Register</button>

</form>

<div class="login-link">
Already have an account? 
<a href="{{ url_for('login') }}">Login</a>
</div>

</div>

</body>
</html>
