<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | Rental System</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: 'Segoe UI', sans-serif;
}

.login-card{
    width:380px;
    background:white;
    padding:35px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.login-title{
    font-weight:600;
    text-align:center;
    margin-bottom:25px;
}

.form-control{
    height:45px;
    border-radius:8px;
}

.btn-login{
    width:100%;
    height:45px;
    border-radius:8px;
    font-weight:500;
}

.register-link{
    text-align:center;
    margin-top:15px;
}

</style>

</head>

<body>

<div class="login-card">

<h3 class="login-title">User Login</h3>

<form method="POST">

<input name="email" placeholder="Email Address" class="form-control mb-3" required>

<input name="password" type="password" placeholder="Password" class="form-control mb-3" required>

<button class="btn btn-success btn-login">Login</button>

</form>

<div class="register-link">
Don't have an account? 
<a href="{{ url_for('register') }}">Register Now</a>
</div>

</div>

</body>
</html>
